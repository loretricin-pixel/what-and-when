<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What and When</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        :root {
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --animation: slideIn;
            --animation-speed: 0.5s;
            --glass-enabled: 0;
            --glass-blur: 15px;
            --glass-opacity: 0.25;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
        }

        /* Анимации для постов */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
        @keyframes bounceIn { 0% { opacity: 0; transform: scale(0.3); } 50% { transform: scale(1.08); } 70% { transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes flipIn { from { opacity: 0; transform: perspective(400px) rotateX(90deg); } to { opacity: 1; transform: perspective(400px) rotateX(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes waveIn { 0% { opacity: 0; transform: translateX(-30px) rotate(-3deg); } 50% { transform: translateX(15px) rotate(2deg); } 100% { opacity: 1; transform: translateX(0) rotate(0); } }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes storyProgress { from { width: 100%; } to { width: 0%; } }
        @keyframes giftFlyIn { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 50% { transform: translateY(-20px) scale(1.2); opacity: 1; } 70% { transform: translateY(10px) scale(0.95); } 100% { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes giftGlow { 0%, 100% { filter: drop-shadow(0 0 10px gold); } 50% { filter: drop-shadow(0 0 30px gold) drop-shadow(0 0 60px orange); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 15% { transform: scale(1.3); } 30% { transform: scale(1); } 45% { transform: scale(1.15); } 60% { transform: scale(1); } }
        @keyframes typing { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* Темы */
        [data-theme="light"] {
            --bg: #f0f2f5;
            --text: #1a1a1a;
            --card: #ffffff;
            --border: #dbdbdb;
            --accent: #0095f6;
            --secondary: #8e8e8e;
            --neon-glow: none;
            --neon-border: none;
            --hover: rgba(0,0,0,0.05);
            --glass-bg: rgba(255,255,255,0.5);
            --glass-border: rgba(255,255,255,0.6);
        }

        [data-theme="dark"] {
            --bg: #1a1a2e;
            --text: #e0e0e0;
            --card: #16213e;
            --border: #0f3460;
            --accent: #e94560;
            --secondary: #a8a8a8;
            --neon-glow: none;
            --neon-border: none;
            --hover: rgba(255,255,255,0.05);
            --glass-bg: rgba(22,33,62,0.5);
            --glass-border: rgba(255,255,255,0.1);
        }

        [data-theme="neon"] {
            --bg: #0a0a0f;
            --text: #e0e0ff;
            --card: rgba(15, 15, 30, 0.9);
            --border: var(--neon-color, #ff00ff);
            --accent: #00ffff;
            --secondary: var(--neon-color, #ff00ff);
            --neon-glow: 0 0 10px var(--neon-color, #ff00ff), 0 0 30px var(--neon-color, #ff00ff);
            --neon-border: 0 0 8px var(--neon-color, #ff00ff), inset 0 0 4px var(--neon-color, #ff00ff);
            --hover: rgba(255,0,255,0.1);
            --glass-bg: rgba(15,15,30,0.4);
            --glass-border: rgba(255,0,255,0.3);
        }

        [data-theme="custom"] {
            --bg: var(--custom-bg, #ffffff);
            --text: var(--custom-text, #000000);
            --card: var(--custom-card, #ffffff);
            --border: var(--custom-border, #dbdbdb);
            --accent: var(--custom-accent, #0095f6);
            --secondary: var(--custom-secondary, #8e8e8e);
            --neon-glow: none;
            --neon-border: none;
            --hover: var(--custom-hover, rgba(0,0,0,0.05));
            --glass-bg: rgba(255,255,255,0.5);
            --glass-border: rgba(255,255,255,0.6);
        }

        /* Стеклянный эффект - применяется через JS */
        .glass-enabled .post,
        .glass-enabled .profile-section,
        .glass-enabled .stories-bar,
        .glass-enabled .post-creator,
        .glass-enabled .gifts-section,
        .glass-enabled .settings-section,
        .glass-enabled .modal-content,
        .glass-enabled .search-results,
        .glass-enabled .group-item,
        .glass-enabled .comment {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(var(--glass-blur, 15px)) !important;
            -webkit-backdrop-filter: blur(var(--glass-blur, 15px)) !important;
            border: 1px solid var(--glass-border) !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15) !important;
        }

        .glass-enabled .header {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(var(--glass-blur, 15px)) !important;
            -webkit-backdrop-filter: blur(var(--glass-blur, 15px)) !important;
            border-bottom: 1px solid var(--glass-border) !important;
        }

        /* Шапка */
        .header {
            background: var(--card);
            border-bottom: 2px solid var(--border);
            padding: 12px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: var(--neon-glow);
            transition: all 0.3s ease;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: var(--accent);
            text-shadow: var(--neon-glow);
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }

        .logo:hover { animation: pulse 0.5s ease; }

        .theme-toggle {
            background: none;
            border: 2px solid var(--border);
            color: var(--text);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: var(--neon-border);
            padding: 0;
        }

        .theme-toggle:hover { transform: scale(1.1); }

        .nav-buttons { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: var(--neon-border);
        }

        button:hover { opacity: 0.85; transform: translateY(-2px); }
        button:active { transform: scale(0.95); }
        button.secondary { background: transparent; border: 2px solid var(--border); color: var(--text); box-shadow: none; }
        button.danger { background: #ff4444; }
        button.success { background: #4caf50; }

        /* Контейнер */
        .container { max-width: 850px; margin: 20px auto; padding: 0 15px; }

        /* Поиск */
        .search-section { margin-bottom: 15px; }

        .search-bar {
            display: flex;
            gap: 0;
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: var(--card);
            box-shadow: var(--neon-border);
        }

        .search-bar input {
            flex: 1;
            border: none;
            padding: 12px 15px;
            font-size: 16px;
            background: transparent;
            color: var(--text);
            outline: none;
            margin: 0;
            border-radius: 0;
        }

        .search-tabs {
            display: flex;
            border-bottom: 2px solid var(--border);
            border-radius: 12px 12px 0 0;
            overflow: hidden;
        }

        .search-tab {
            flex: 1;
            padding: 10px 8px;
            text-align: center;
            cursor: pointer;
            background: var(--bg);
            color: var(--secondary);
            border: none;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
            font-size: 13px;
            border-radius: 0;
        }

        .search-tab:hover { background: var(--hover); transform: none; }
        .search-tab.active { border-bottom-color: var(--accent); color: var(--accent); font-weight: bold; background: var(--card); }

        .search-results {
            background: var(--card);
            border: 2px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            display: none;
            max-height: 400px;
            overflow-y: auto;
            animation: slideDown 0.3s ease;
            box-shadow: var(--neon-glow);
        }

        .search-results.active { display: block; }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            cursor: pointer;
            transition: 0.3s;
            border-bottom: 1px solid var(--border);
        }

        .search-result-item:hover { background: var(--hover); }
        .search-result-item:last-child { border-bottom: none; }

        /* Истории */
        .stories-bar {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: var(--card);
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            overflow-x: auto;
            scroll-behavior: smooth;
            box-shadow: var(--neon-glow);
            transition: all 0.3s ease;
        }

        .stories-bar::-webkit-scrollbar { height: 4px; }
        .stories-bar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: 0.3s;
            min-width: 70px;
            flex-shrink: 0;
        }

        .story-item:hover { transform: scale(1.05); }

        .story-ring {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        .story-ring.viewed { background: var(--border); }
        .story-ring.add-story { background: var(--border); display: flex; align-items: center; justify-content: center; }
        .story-avatar { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--card); object-fit: cover; background: var(--accent); }
        .story-username { font-size: 12px; color: var(--secondary); max-width: 70px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: center; }

        /* Просмотр историй */
        .story-viewer {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .story-viewer.active { display: flex; }

        .story-viewer-content {
            max-width: 500px;
            max-height: 80vh;
            position: relative;
            border-radius: 15px;
            overflow: hidden;
        }

        .story-viewer-content img, .story-viewer-content video {
            width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 15px;
        }

        .story-progress-bar {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            height: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
        }

        .story-progress-fill { height: 100%; background: white; animation: storyProgress 5s linear forwards; }
        .story-viewer-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; z-index: 10; }
        .story-viewer-nav { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 40px; cursor: pointer; z-index: 10; background: rgba(0,0,0,0.5); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .story-viewer-prev { left: 10px; }
        .story-viewer-next { right: 10px; }

        /* Профиль */
        .profile-section {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            box-shadow: var(--neon-glow);
            transition: all 0.3s ease;
        }

        .banner-container {
            position: relative;
            height: 250px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            cursor: pointer;
        }

        .banner-container.birthday {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcf7f, #4d96ff) !important;
            background-size: 400% 400% !important;
            animation: gradientShift 3s ease infinite !important;
        }

        .banner-img { width: 100%; height: 100%; object-fit: cover; }

        .banner-upload-hint {
            position: absolute;
            bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: 0.3s;
            cursor: pointer;
        }

        .banner-container:hover .banner-upload-hint { opacity: 1; }

        .profile-header {
            display: flex;
            align-items: flex-end;
            padding: 0 20px;
            margin-top: -50px;
            position: relative;
            flex-wrap: wrap;
            gap: 15px;
        }

        .avatar-container { position: relative; cursor: pointer; flex-shrink: 0; }
        .avatar-img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--card); object-fit: cover; background: var(--accent); }
        .avatar-upload-hint { position: absolute; bottom: 5px; right: 5px; background: var(--accent); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; opacity: 0; transition: 0.3s; }
        .avatar-container:hover .avatar-upload-hint { opacity: 1; }

        .profile-info { flex: 1; min-width: 200px; }
        .profile-nick { font-size: 24px; font-weight: bold; }
        .profile-username { color: var(--secondary); font-size: 16px; }
        .profile-birthday { font-size: 13px; color: var(--secondary); margin-top: 2px; }

        .profile-stats { display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap; }
        .stat { cursor: pointer; transition: 0.3s; text-align: center; }
        .stat:hover { transform: scale(1.1); }
        .stat-number { font-size: 20px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 12px; color: var(--secondary); }

        .profile-actions { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }

        /* Подарки в профиле */
        .gifts-section {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            box-shadow: var(--neon-glow);
            transition: all 0.3s ease;
        }

        .gifts-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }

        .gifts-grid { display: flex; gap: 15px; flex-wrap: wrap; }

        .gift-item {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            animation: float 3s ease-in-out infinite;
            background: var(--bg);
            border-radius: 15px;
            border: 2px solid var(--border);
        }

        .gift-item:hover { transform: scale(1.2); animation: giftGlow 1s ease infinite; }
        .gift-item:nth-child(2n) { animation-delay: 0.5s; }
        .gift-item:nth-child(3n) { animation-delay: 1s; }
        .gift-item:nth-child(4n) { animation-delay: 1.5s; }

        .gift-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Анимация подарка на весь экран */
        .gift-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .gift-overlay.active { display: flex; }
        .gift-overlay-content { font-size: 150px; animation: giftFlyIn 0.8s ease forwards, giftGlow 1.5s ease infinite 0.8s; }
        .gift-overlay-text { color: white; font-size: 24px; margin-top: 20px; animation: fadeIn 0.5s ease 0.5s forwards; opacity: 0; }
        .gift-overlay-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 30px; cursor: pointer; }

        /* Каталог подарков */
        .gift-catalog { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; padding: 10px 0; }

        .gift-catalog-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 40px;
            border: 2px solid transparent;
            background: var(--bg);
        }

        .gift-catalog-item:hover { border-color: var(--accent); transform: scale(1.05); box-shadow: var(--neon-glow); }
        .gift-catalog-item span { font-size: 12px; color: var(--secondary); }

        /* Посты */
        .post-creator {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            box-shadow: var(--neon-glow);
            transition: all 0.3s ease;
        }

        .media-upload-area {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .media-upload-area:hover { border-color: var(--accent); background: var(--hover); }

        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin: 10px 0; }
        .media-item { position: relative; aspect-ratio: 1; border-radius: 10px; overflow: hidden; }
        .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
        .remove-media { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.8); color: white; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 14px; padding: 0; z-index: 2; }

        textarea, input[type="text"], input[type="password"], input[type="search"], input[type="date"], select {
            width: 100%;
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            resize: vertical;
            font-family: var(--font-family);
        }

        textarea:focus, input:focus, select:focus { border-color: var(--accent); outline: none; }

        .post {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            border: 2px solid var(--border);
            position: relative;
            transition: all 0.3s ease;
            box-shadow: var(--neon-glow);
            /* Анимация задается через style */
        }

        .post:hover { transform: translateY(-2px); }

        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .post-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: var(--accent); cursor: pointer; }
        .post-menu { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 20px; color: var(--secondary); z-index: 5; }

        .post-menu-content {
            display: none;
            position: absolute;
            top: 40px; right: 20px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 5px;
            z-index: 10;
            min-width: 160px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .post-menu-content.active { display: block; }
        .post-menu-content button { display: block; width: 100%; margin: 3px 0; text-align: left; }

        .post-media { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin: 15px 0; }
        .post-media img, .post-media video { width: 100%; border-radius: 10px; cursor: pointer; }

        .post-actions { display: flex; gap: 15px; margin-top: 15px; align-items: center; flex-wrap: wrap; }

        .like-btn { cursor: pointer; font-size: 24px; transition: 0.3s; user-select: none; }
        .like-btn:hover { transform: scale(1.2); }
        .like-btn.liked { animation: heartbeat 0.6s ease; }

        /* Комментарии */
        .comment-preview { margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .comment { background: var(--bg); padding: 10px; border-radius: 8px; margin: 8px 0; }
        .comment.reply { margin-left: 30px; border-left: 3px solid var(--accent); }
        .comment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .comment-actions { display: flex; gap: 10px; font-size: 12px; color: var(--secondary); }
        .comment-actions span { cursor: pointer; }
        .comment-actions span:hover { color: var(--accent); }
        .show-all-comments { color: var(--accent); cursor: pointer; margin-top: 10px; text-align: center; }

        /* Фильтры для медиа */
        .filter-controls { display: flex; gap: 10px; flex-wrap: wrap; padding: 8px; background: rgba(0,0,0,0.7); border-radius: 0 0 8px 8px; }
        .filter-control { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: white; }
        .filter-control input[type="range"] { width: 60px; margin: 0; padding: 0; }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            max-width: 650px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border: 2px solid var(--border);
            box-shadow: var(--neon-glow);
            transition: all 0.3s ease;
        }

        /* Чат */
        .chat-container { display: flex; height: 70vh; gap: 0; }
        .chat-list { width: 200px; border-right: 2px solid var(--border); overflow-y: auto; background: var(--card); }
        .chat-contact { padding: 15px; cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.3s; }
        .chat-contact:hover, .chat-contact.active { background: var(--hover); }
        .chat-messages { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .messages-list { flex: 1; overflow-y: auto; padding: 15px; }

        .message { margin: 10px 0; max-width: 70%; position: relative; }
        .message.sent { margin-left: auto; background: var(--accent); color: white; border-radius: 15px 15px 0 15px; padding: 10px; }
        .message.received { margin-right: auto; background: var(--card); border-radius: 15px 15px 15px 0; padding: 10px; border: 1px solid var(--border); }

        .message-actions { display: none; position: absolute; top: -25px; right: 0; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 3px; gap: 3px; z-index: 5; }
        .message:hover .message-actions { display: flex; }
        .message-actions span { cursor: pointer; font-size: 14px; padding: 2px 5px; transition: 0.3s; }
        .message-actions span:hover { transform: scale(1.3); }
        .message-reactions { display: flex; gap: 4px; margin-top: 5px; font-size: 14px; }
        .message.pinned-message { border-left: 3px solid gold; padding-left: 15px; background: rgba(255,215,0,0.1); }

        .typing-indicator { display: none; padding: 10px 15px; font-size: 13px; color: var(--secondary); font-style: italic; }
        .typing-indicator.active { display: block; }
        .typing-dot { animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        .chat-input-area { display: flex; gap: 10px; padding: 15px; border-top: 2px solid var(--border); align-items: center; background: var(--card); }
        .chat-input-area input { margin: 0; flex: 1; }

        /* Стикеры */
        .sticker-panel { display: none; grid-template-columns: repeat(6, 1fr); gap: 8px; padding: 15px; background: var(--card); border-top: 2px solid var(--border); max-height: 200px; overflow-y: auto; }
        .sticker-panel.active { display: grid; }
        .sticker-item { font-size: 32px; cursor: pointer; transition: 0.3s; text-align: center; padding: 6px; border-radius: 10px; }
        .sticker-item:hover { background: var(--hover); transform: scale(1.2); }

        /* Настройки */
        .settings-section {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
            box-shadow: var(--neon-glow);
            transition: all 0.3s ease;
        }

        .settings-section h3 { margin-bottom: 15px; color: var(--accent); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 10px; }
        .color-picker-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        /* График активности */
        .activity-chart { display: flex; align-items: flex-end; gap: 5px; height: 150px; padding: 10px; background: var(--bg); border-radius: 10px; }
        .activity-bar { flex: 1; background: var(--accent); border-radius: 5px 5px 0 0; min-height: 5px; transition: 0.5s ease; position: relative; cursor: pointer; }
        .activity-bar:hover { opacity: 0.7; }
        .activity-bar span { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--secondary); white-space: nowrap; }

        /* Группы */
        .groups-list { display: flex; flex-direction: column; gap: 10px; }
        .group-item { display: flex; align-items: center; gap: 15px; padding: 15px; background: var(--card); border-radius: 15px; border: 2px solid var(--border); cursor: pointer; transition: 0.3s; box-shadow: var(--neon-glow); }
        .group-item:hover { transform: translateY(-2px); }
        .group-avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 30px; flex-shrink: 0; }

        .notif-badge-dot { position: absolute; top: 2px; right: 2px; width: 10px; height: 10px; background: red; border-radius: 50%; display: none; }
        .notification-badge-btn { position: relative; }

        /* Адаптивность */
        @media (max-width: 768px) {
            .banner-container { height: 150px; }
            .avatar-img { width: 80px; height: 80px; }
            .profile-header { margin-top: -40px; }
            .profile-stats { gap: 10px; }
            .nav-buttons { width: 100%; justify-content: center; }
            .header { flex-direction: column; }
            .post-media { grid-template-columns: 1fr; }
            .chat-container { flex-direction: column; }
            .chat-list { width: 100%; height: 120px; }
            .search-tabs { flex-wrap: wrap; }
            .search-tab { flex: unset; width: 33.33%; font-size: 11px; padding: 8px 4px; }
            .gifts-grid { justify-content: center; }
            .gift-catalog { grid-template-columns: repeat(3, 1fr); }
            .sticker-panel { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body data-theme="light" id="bodyRoot">

    <div class="header" id="mainHeader">
        <div class="header-left">
            <div class="logo" onclick="showPage('feed')">What and When</div>

    <div class="container" id="app"></div>

    <div class="modal" id="authModal"><div class="modal-content"><h2 id="authTitle">Регистрация</h2><input type="text" id="nickInput" placeholder="Никнейм"><input type="text" id="usernameInput" placeholder="Юзернейм"><input type="password" id="passwordInput" placeholder="Пароль"><label style="display:flex;align-items:center;gap:10px;margin:10px 0;"><span>Дата рождения (необязательно):</span><input type="date" id="birthdayInput" style="width:auto;flex:1;"></label><button onclick="register()">Зарегистрироваться</button><button class="secondary" onclick="switchAuth()">Уже есть аккаунт? Войти</button><button class="secondary" onclick="closeModal('authModal')">Закрыть</button></div></div>

    <div class="modal" id="editProfileModal"><div class="modal-content"><h2>Редактировать профиль</h2><label>Баннер:</label><input type="file" id="bannerInput" accept="image/*" onchange="previewBanner()"><img id="bannerPreview" style="width:100%;max-height:150px;object-fit:cover;margin:10px 0;display:none;"><label>Аватар:</label><input type="file" id="avatarInput" accept="image/*,image/gif" onchange="previewAvatar()"><img id="avatarPreview" style="width:100px;height:100px;border-radius:50%;object-fit:cover;margin:10px 0;display:none;"><label>Никнейм:</label><input type="text" id="editNickInput"><label>Юзернейм:</label><input type="text" id="editUsernameInput"><label>Дата рождения:</label><input type="date" id="editBirthdayInput"><label style="display:flex;align-items:center;gap:10px;margin:10px 0;"><input type="checkbox" id="showBirthdayCheck"><span>Показывать дату рождения</span></label><button onclick="saveProfile()">Сохранить</button><button class="secondary" onclick="closeModal('editProfileModal')">Отмена</button></div></div>

    <div class="modal" id="followersModal"><div class="modal-content"><h2 id="followersTitle">Подписчики</h2><div id="followersList" style="max-height:400px;overflow-y:auto;"></div><button class="secondary" onclick="closeModal('followersModal')" style="margin-top:20px;">Закрыть</button></div></div>

    <div class="modal" id="commentsModal"><div class="modal-content"><h2>Все комментарии</h2><div id="allCommentsList"></div><input type="text" id="modalCommentInput" placeholder="Написать комментарий..."><button onclick="addCommentFromModal()">Отправить</button><button class="secondary" onclick="closeModal('commentsModal')" style="margin-top:10px;">Закрыть</button></div></div>

    <div class="modal" id="statsModal"><div class="modal-content"><h2>📊 Статистика</h2><div id="statsContent"></div><button class="secondary" onclick="closeModal('statsModal')">Закрыть</button></div></div>

    <div class="modal" id="chatModal"><div class="modal-content" style="max-width:750px;padding:0;"><div class="chat-container"><div class="chat-list" id="chatContacts"></div><div class="chat-messages"><div class="messages-list" id="chatMessages"></div><div class="typing-indicator" id="typingIndicator"><span class="typing-dot">.</span><span class="typing-dot">.</span><span class="typing-dot">.</span> печатает</div><div class="sticker-panel" id="stickerPanel"></div><div class="chat-input-area"><button class="secondary" onclick="toggleStickerPanel()" style="font-size:20px;padding:5px 10px;">😊</button><button class="secondary" onclick="startVoiceRecord()" id="voiceBtn" style="font-size:20px;padding:5px 10px;" title="Голосовое сообщение">🎤</button><input type="text" id="chatInput" placeholder="Сообщение..." oninput="handleTyping()"><button onclick="sendMessage()">➤</button></div></div></div><button class="secondary" onclick="closeModal('chatModal')" style="margin:10px;">Закрыть</button></div></div>

    <div class="modal" id="giftCatalogModal"><div class="modal-content"><h2>🎁 Выберите подарок</h2><div class="gift-catalog" id="giftCatalog"></div><button class="secondary" onclick="closeModal('giftCatalogModal')" style="margin-top:15px;">Закрыть</button></div></div>

    <div class="modal" id="groupModal"><div class="modal-content"><h2 id="groupModalTitle">Создать группу</h2><input type="text" id="groupNameInput" placeholder="Название группы"><textarea id="groupDescInput" rows="3" placeholder="Описание группы"></textarea><label style="display:flex;align-items:center;gap:10px;margin:10px 0;"><input type="checkbox" id="groupPrivateCheck"><span>Закрытая группа</span></label><button onclick="saveGroup()" id="groupSaveBtn">Создать</button><button class="secondary" onclick="closeModal('groupModal')">Отмена</button></div></div>

    <div class="modal" id="groupViewModal"><div class="modal-content" id="groupViewContent"></div></div>

    <div class="modal" id="activityModal"><div class="modal-content"><h2>📊 График активности</h2><div id="activityChart"></div><button class="secondary" onclick="closeModal('activityModal')" style="margin-top:15px;">Закрыть</button></div></div>

    <div class="modal" id="notificationsModal"><div class="modal-content"><h2>🔔 Уведомления</h2><div id="notificationsList"></div><button class="secondary" onclick="closeModal('notificationsModal')" style="margin-top:15px;">Закрыть</button></div></div>

    <script>
        // ===== БАЗА ДАННЫХ =====
        let currentUser = JSON.parse(localStorage.getItem('wu_currentUser'));
        let users = JSON.parse(localStorage.getItem('wu_users')) || [];
        let posts = JSON.parse(localStorage.getItem('wu_posts')) || [];
        let currentPage = 'feed';
        let currentViewingUserId = null;
        let currentCommentPostId = null;
        let currentChatUserId = null;
        let searchCategory = 'users';
        let typingTimeout = null;
        let searchTimeout = null;

        let followers = JSON.parse(localStorage.getItem('wu_followers')) || {};
        let following = JSON.parse(localStorage.getItem('wu_following')) || {};
        let stories = JSON.parse(localStorage.getItem('wu_stories')) || [];
        let messages = JSON.parse(localStorage.getItem('wu_messages')) || {};
        let notifications = JSON.parse(localStorage.getItem('wu_notifications')) || [];
        let gifts = JSON.parse(localStorage.getItem('wu_gifts')) || {};
        let groups = JSON.parse(localStorage.getItem('wu_groups')) || [];
        let loginHistory = JSON.parse(localStorage.getItem('wu_loginHistory')) || [];

        let storyQueue = [];
        let currentStoryIndex = 0;
        let storyTimer = null;
        let mediaRecorder = null;
        let audioChunks = [];

        let settings = JSON.parse(localStorage.getItem('wu_settings')) || {
            theme: 'light', neonColor: '#ff00ff', animation: 'slideIn', animationSpeed: '0.5s',
            font: 'Segoe UI', privateAccount: false, hideFromSearch: false, whitelistOnly: false,
            glassEnabled: false, glassBlur: 15, glassOpacity: 0.25,
            showGifts: true, showBirthday: true, twoFactorEnabled: false, twoFactorCode: '',
            customBg: '#ffffff', customText: '#000000', customCard: '#ffffff', customBorder: '#dbdbdb',
            customAccent: '#0095f6', customSecondary: '#8e8e8e', customHover: 'rgba(0,0,0,0.05)'
        };

        const giftCatalog = [
            { emoji: '🎂', name: 'Торт' }, { emoji: '🌸', name: 'Цветок' }, { emoji: '💎', name: 'Алмаз' },
            { emoji: '🚀', name: 'Ракета' }, { emoji: '⭐', name: 'Звезда' }, { emoji: '💜', name: 'Сердце' },
            { emoji: '🔥', name: 'Огонь' }, { emoji: '🦄', name: 'Единорог' }, { emoji: '🌈', name: 'Радуга' },
            { emoji: '👑', name: 'Корона' }, { emoji: '🎉', name: 'Хлопушка' }, { emoji: '💝', name: 'Валентинка' }
        ];

        const stickers = ['😀','😂','😍','😢','😡','👍','👎','🎉','💯','🔥','❤️','💔','🤔','😎','🥳','🤗','🙏','💪','🌟','✨','🎂','🍕','🎵','🌈','🦊','🐱','🐶'];

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        if (users.length === 0) {
            users = [
                { id: 0, nick: 'NeonMaster', username: '@neon_master', password: '123', avatar: null, banner: null, private: false, birthday: null, showBirthday: true, hideFromSearch: false, whitelist: [] },
                { id: 1, nick: 'CyberKat', username: '@cyber_kat', password: '123', avatar: null, banner: null, private: false, birthday: '2000-05-15', showBirthday: true, hideFromSearch: false, whitelist: [] },
                { id: 2, nick: 'PixelFox', username: '@pixel_fox', password: '123', avatar: null, banner: null, private: false, birthday: null, showBirthday: false, hideFromSearch: false, whitelist: [] }
            ];
            saveUsers();
            followers[0] = [1,2]; followers[1] = [0]; followers[2] = [0];
            following[0] = [1]; following[1] = [0,2]; following[2] = [0];
            saveFollowers();
            messages[0]={}; messages[1]={}; messages[2]={}; saveMessages();
            gifts[0]=[]; gifts[1]=[{emoji:'💜',from:0,fromNick:'NeonMaster',date:new Date().toISOString()}]; gifts[2]=[];
            saveGifts();
            groups.push({id:1,name:'Neon Community',desc:'Фанаты неона',owner:0,members:[0,1,2],admins:[0],private:false,avatar:null,date:new Date().toISOString()});
            saveGroups();
        }

        if (posts.length === 0) {
            posts = [{id:1,userId:0,nick:'NeonMaster',username:'@neon_master',userAvatar:null,text:'Добро пожаловать в What and When! ✨ #привет',media:[],likes:[1,2],comments:[{id:1,userId:1,nick:'CyberKat',text:'Круто! 💜',parentId:null,date:new Date().toISOString()}],reposts:[],hashtags:['#привет'],mentions:[],views:15,date:new Date().toISOString(),pinned:true,source:'original'}];
            savePosts();
        }

        // ===== СОХРАНЕНИЕ =====
        function saveUsers(){localStorage.setItem('wu_users',JSON.stringify(users));}
        function savePosts(){localStorage.setItem('wu_posts',JSON.stringify(posts));}
        function saveCurrentUser(){if(currentUser!==null&&currentUser!==undefined)localStorage.setItem('wu_currentUser',JSON.stringify(currentUser));else localStorage.removeItem('wu_currentUser');}
        function saveFollowers(){localStorage.setItem('wu_followers',JSON.stringify(followers));localStorage.setItem('wu_following',JSON.stringify(following));}
        function saveStories(){localStorage.setItem('wu_stories',JSON.stringify(stories));}
        function saveMessages(){localStorage.setItem('wu_messages',JSON.stringify(messages));}
        function saveNotifications(){localStorage.setItem('wu_notifications',JSON.stringify(notifications));}
        function saveGifts(){localStorage.setItem('wu_gifts',JSON.stringify(gifts));}
        function saveGroups(){localStorage.setItem('wu_groups',JSON.stringify(groups));}
        function saveSettings(){localStorage.setItem('wu_settings',JSON.stringify(settings));}
        function saveLoginHistory(){localStorage.setItem('wu_loginHistory',JSON.stringify(loginHistory));}

        function fileToBase64(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(reader.result);reader.onerror=reject;reader.readAsDataURL(file);});}

        // ===== ТЕМЫ =====
        function quickThemeToggle(){
            const ct=document.body.getAttribute('data-theme');
            const themes=['light','dark','neon','custom'];
            const idx=themes.indexOf(ct);
            applyTheme(themes[(idx+1)%themes.length]);
            if(currentPage==='settings')renderPage();
        }

        function applyTheme(theme){
            document.body.setAttribute('data-theme',theme);
            settings.theme=theme;saveSettings();
            const tb=document.querySelector('.theme-toggle');
            if(theme==='light')tb.textContent='☀️';
            else if(theme==='dark')tb.textContent='🌙';
            else if(theme==='neon')tb.textContent='💜';
            else tb.textContent='🎨';
            applyNeonAndCustom();
            applyGlassEffect();
        }

        function applyNeonAndCustom(){
            const root=document.documentElement;
            if(settings.theme==='neon'){
                root.style.setProperty('--neon-color',settings.neonColor);
            }
            if(settings.theme==='custom'){
                root.style.setProperty('--custom-bg',settings.customBg);
                root.style.setProperty('--custom-text',settings.customText);
                root.style.setProperty('--custom-card',settings.customCard);
                root.style.setProperty('--custom-border',settings.customBorder);
                root.style.setProperty('--custom-accent',settings.customAccent);
                root.style.setProperty('--custom-secondary',settings.customSecondary);
                root.style.setProperty('--custom-hover',settings.customHover);
            }
        }

        function updateNeonColor(color){
            settings.neonColor=color;
            document.documentElement.style.setProperty('--neon-color',color);
            saveSettings();
        }

        function applyAllSettings(){
            applyTheme(settings.theme);
            document.documentElement.style.setProperty('--animation',settings.animation);
            document.documentElement.style.setProperty('--animation-speed',settings.animationSpeed);
            document.documentElement.style.setProperty('--font-family',`'${settings.font}',sans-serif`);
            applyGlassEffect();
        }

        function applyGlassEffect(){
            const root=document.documentElement;
            root.style.setProperty('--glass-blur',settings.glassBlur+'px');
            root.style.setProperty('--glass-opacity',settings.glassOpacity);
            if(settings.glassEnabled){
                document.body.classList.add('glass-enabled');
            }else{
                document.body.classList.remove('glass-enabled');
            }
        }

        // ===== НАВИГАЦИЯ =====
        function showPage(page,userId=null){
            currentPage=page;
            if(userId!==null)currentViewingUserId=userId;
            if((page==='profile'||page==='userProfile')&&currentUser===null&&!userId){openAuthModal();return;}
            renderPage();window.scrollTo(0,0);
        }
        function viewUserProfile(userId){showPage(userId===currentUser?'profile':'userProfile',userId);}

        // ===== АВТОРИЗАЦИЯ =====
        function openAuthModal(){document.getElementById('authModal').classList.add('active');}
        function closeModal(id){document.getElementById(id).classList.remove('active');}
        function switchAuth(){const t=document.getElementById('authTitle');t.textContent=t.textContent==='Регистрация'?'Вход':'Регистрация';}

        function register(){
            const nick=document.getElementById('nickInput').value.trim();
            const username=document.getElementById('usernameInput').value.trim();
            const password=document.getElementById('passwordInput').value;
            const birthday=document.getElementById('birthdayInput').value;
            const authTitle=document.getElementById('authTitle').textContent;
            if(!nick||!username||!password){alert('Заполните все поля!');return;}
            if(authTitle==='Регистрация'){
                if(users.find(u=>u.username===username)){alert('Юзернейм занят!');return;}
                const newUser={id:users.length,nick,username,password,avatar:null,banner:null,private:false,birthday:birthday||null,showBirthday:true,hideFromSearch:false,whitelist:[]};
                users.push(newUser);followers[newUser.id]=[];following[newUser.id]=[];messages[newUser.id]={};gifts[newUser.id]=[];
                saveUsers();saveFollowers();saveMessages();saveGifts();
                currentUser=newUser.id;saveCurrentUser();
                addLoginRecord();
                alert('Регистрация успешна!');
            }else{
                const ui=users.findIndex(u=>u.username===username&&u.password===password);
                if(ui===-1){alert('Неверный логин или пароль!');return;}
                if(users[ui].twoFactorCode){
                    const code=prompt('Введите код двухфакторной аутентификации:');
                    if(code!==users[ui].twoFactorCode){alert('Неверный код!');return;}
                }
                currentUser=ui;saveCurrentUser();
                addLoginRecord();
                alert('Вход выполнен!');
            }
            closeModal('authModal');updateUI();showPage('feed');
        }

        function logout(){currentUser=null;saveCurrentUser();updateUI();showPage('feed');}

        function addLoginRecord(){
            loginHistory.unshift({userId:currentUser,date:new Date().toISOString(),device:navigator.userAgent.substring(0,60),ip:'192.168.'+Math.floor(Math.random()*255)+'.'+Math.floor(Math.random()*255)});
            if(loginHistory.length>50)loginHistory=loginHistory.slice(0,50);
            saveLoginHistory();
        }

        // ===== УВЕДОМЛЕНИЯ =====

                }else if(searchCategory==='hashtags'){

        function startVoiceRecord(){
            if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){alert('Голосовые сообщения не поддерживаются.');return;}
            const voiceBtn=document.getElementById('voiceBtn');
            if(mediaRecorder&&mediaRecorder.state==='recording'){mediaRecorder.stop();voiceBtn.textContent='🎤';voiceBtn.style.background='';return;}
            navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
                mediaRecorder=new MediaRecorder(stream);audioChunks=[];
                mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
                mediaRecorder.onstop=()=>{
                    const audioBlob=new Blob(audioChunks,{type:'audio/webm'});

        function forwardMessage(msgId){

            const fonts=['Segoe UI','Arial','Georgia','Courier New','Impact','Comic Sans MS'];
            const animations=['slideIn','fadeIn','scaleIn','bounceIn','flipIn','slideUp','waveIn'];
            const animNames={slideIn:'Скольжение',fadeIn:'Затухание',scaleIn:'Масштабирование',bounceIn:'Прыжок',flipIn:'Разворот',slideUp:'Выезд снизу',waveIn:'Волна'};

            app.innerHTML=`<h2>⚙️ Настройки</h2>
                <div class="settings-section"><h3>🎨 Тема</h3><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;"><button onclick="applyTheme('light');renderSettings(app);" class="${settings.theme==='light'?'':'secondary'}">☀️ Светлая</button><button onclick="applyTheme('dark');renderSettings(app);" class="${settings.theme==='dark'?'':'secondary'}">🌙 Тёмная</button><button onclick="applyTheme('neon');renderSettings(app);" class="${settings.theme==='neon'?'':'secondary'}">💜 Неон</button><button onclick="applyTheme('custom');renderSettings(app);" class="${settings.theme==='custom'?'':'secondary'}">🎨 Кастомная</button></div>
                ${settings.theme==='neon'?`<div style="margin-top:10px;padding:10px;background:var(--bg);border-radius:10px;"><label><strong>⚡ Настройки неона:</strong></label><div style="display:flex;align-items:center;gap:10px;margin-top:8px;"><span>Цвет свечения:</span><input type="color" value="${settings.neonColor}" onchange="updateNeonColor(this.value);"><span style="font-size:12px;color:var(--secondary);">Меняет цвет обводки и свечения</span></div></div>`:''}
                ${settings.theme==='custom'?`<div style="margin-top:10px;padding:10px;background:var(--bg);border-radius:10px;"><label><strong>🎨 Настройки кастомной темы:</strong></label><div style="display:grid;gap:8px;margin-top:8px;"><div class="color-picker-group"><span>Фон страницы:</span><input type="color" value="${settings.customBg}" onchange="settings.customBg=this.value;applyAllSettings();saveSettings();"></div><div class="color-picker-group"><span>Цвет текста:</span><input type="color" value="${settings.customText}" onchange="settings.customText=this.value;applyAllSettings();saveSettings();"></div><div class="color-picker-group"><span>Фон карточек:</span><input type="color" value="${settings.customCard}" onchange="settings.customCard=this.value;applyAllSettings();saveSettings();"></div><div class="color-picker-group"><span>Цвет границ:</span><input type="color" value="${settings.customBorder}" onchange="settings.customBorder=this.value;applyAllSettings();saveSettings();"></div><div class="color-picker-group"><span>Акцентный цвет:</span><input type="color" value="${settings.customAccent}" onchange="settings.customAccent=this.value;applyAllSettings();saveSettings();"></div></div></div>`:''}</div>
                <div class="settings-section"><h3>💎 Стеклянные карточки (Glass Effect)</h3><div class="setting-item"><span>Включить эффект стекла</span><input type="checkbox" ${settings.glassEnabled?'checked':''} onchange="settings.glassEnabled=this.checked;applyAllSettings();saveSettings();renderSettings(app);"></div>${settings.glassEnabled?`<div style="margin-top:10px;padding:10px;background:var(--bg);border-radius:10px;"><label>Сила размытия: <strong>${settings.glassBlur}px</strong></label><input type="range" min="5" max="30" step="1" value="${settings.glassBlur}" onchange="settings.glassBlur=parseInt(this.value);applyAllSettings();saveSettings();renderSettings(app);"><label>Прозрачность: <strong>${Math.round(settings.glassOpacity*100)}%</strong></label><input type="range" min="5" max="100" step="5" value="${Math.round(settings.glassOpacity*100)}" onchange="settings.glassOpacity=parseInt(this.value)/100;applyAllSettings();saveSettings();renderSettings(app);"><p style="font-size:11px;color:var(--secondary);margin-top:5px;">💡 Совет: включите неон + стекло — выглядит потрясающе!</p></div>`:''}</div>
                <div class="settings-section"><h3>✨ Анимации постов</h3><div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;">${animations.map(a=>`<button onclick="settings.animation='${a}';applyAllSettings();saveSettings();renderSettings(app);" class="${settings.animation===a?'':'secondary'}">${animNames[a]}</button>`).join('')}</div><label>Скорость анимации: <strong>${settings.animationSpeed}</strong></label><input type="range" min="0.1" max="1.5" step="0.1" value="${parseFloat(settings.animationSpeed)}" onchange="settings.animationSpeed=this.value+'s';applyAllSettings();saveSettings();renderSettings(app);"><p style="font-size:11px;color:var(--secondary);margin-top:5px;">💡 Анимации применяются к новым постам при загрузке страницы</p></div>
                <div class="settings-section"><h3>🔤 Шрифт</h3><select onchange="settings.font=this.value;applyAllSettings();saveSettings();renderSettings(app);" style="width:100%;padding:10px;border-radius:10px;background:var(--bg);color:var(--text);border:2px solid var(--border);">${fonts.map(f=>`<option value="${f}" ${settings.font===f?'selected':''}>${f}</option>`).join('')}</select></div>
                <div class="settings-section"><h3>🔒 Приватность и безопасность</h3><div class="setting-item"><span>Приватный аккаунт</span><input type="checkbox" ${settings.privateAccount?'checked':''} onchange="togglePrivateAccount(this.checked)"></div><div class="setting-item"><span>Скрыть профиль из поиска</span><input type="checkbox" ${settings.hideFromSearch?'checked':''} onchange="settings.hideFromSearch=this.checked;if(currentUser!==null){users[currentUser].hideFromSearch=this.checked;saveUsers();}saveSettings();"></div><div class="setting-item"><span>Белый список для ЛС</span><input type="checkbox" ${settings.whitelistOnly?'checked':''} onchange="settings.whitelistOnly=this.checked;saveSettings();renderSettings(app);"></div>${settings.whitelistOnly?`<div style="margin-top:10px;"><p style="font-size:12px;color:var(--secondary);">ID пользователей через запятую (можно найти в поиске):</p><input type="text" value="${users[currentUser]?.whitelist?.join(',')||''}" onchange="if(currentUser!==null){users[currentUser].whitelist=this.value.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));saveUsers();}"></div>`:''}<div class="setting-item"><span>Двухфакторная аутентификация</span><input type="checkbox" ${settings.twoFactorEnabled?'checked':''} onchange="toggleTwoFactor(this.checked);"></div>${currentUser!==null?`<div style="margin-top:15px;"><h4>📜 История входов (последние 10)</h4>${loginHistory.filter(l=>l.userId===currentUser).slice(0,10).map(l=>`<div style="font-size:11px;color:var(--secondary);padding:5px 0;border-bottom:1px solid var(--border);">${new Date(l.date).toLocaleString()} — ${l.device.substring(0,40)}...</div>`).join('')||'<p style="font-size:12px;">Нет записей</p>'}</div>`:''}</div>
                <div class="settings-section"><h3>💾 Данные</h3><button onclick="exportData()">📤 Экспорт всех данных</button><button class="secondary" onclick="document.getElementById('importFile').click()" style="margin-left:10px;">📥 Импорт</button><input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(this.files[0])"><button class="danger" onclick="if(confirm('Удалить ВСЕ данные? Это необратимо!')){localStorage.clear();location.reload();}" style="margin-top:10px;display:block;">🗑️ Полный сброс</button></div>
                <button onclick="showPage('feed')" style="margin-top:20px;">← Вернуться в ленту</button>`;
        }

        function togglePrivateAccount(checked){if(currentUser===null)return;users[currentUser].private=checked;settings.privateAccount=checked;saveUsers();saveSettings();}
        function toggleTwoFactor(checked){
            if(checked){const code=prompt('Придумайте секретный код (цифры/буквы):');if(code&&code.length>=3){settings.twoFactorCode=code;settings.twoFactorEnabled=true;if(currentUser!==null){users[currentUser].twoFactorCode=code;saveUsers();}}else{alert('Код должен быть не менее 3 символов!');return;}}
            else{settings.twoFactorCode='';settings.twoFactorEnabled=false;if(currentUser!==null){users[currentUser].twoFactorCode='';saveUsers();}}
            saveSettings();renderSettings(document.getElementById('app'));
        }
        function exportData(){const data={users,posts,followers,following,stories,messages,notifications,gifts,groups,loginHistory,settings,version:'2.1',exportDate:new Date().toISOString()};const blob=new Blob([JSON.stringify(data)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`what-and-when-${new Date().toISOString().split('T')[0]}.json`;a.click();}
        function importData(file){if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const d=JSON.parse(e.target.result);if(d.users)users=d.users;if(d.posts)posts=d.posts;if(d.followers)followers=d.followers;if(d.following)following=d.following;if(d.stories)stories=d.stories;if(d.messages)messages=d.messages;if(d.notifications)notifications=d.notifications;if(d.gifts)gifts=d.gifts;if(d.groups)groups=d.groups;if(d.loginHistory)loginHistory=d.loginHistory;if(d.settings)settings=d.settings;saveUsers();savePosts();saveFollowers();saveStories();saveMessages();saveNotifications();saveGifts();saveGroups();saveLoginHistory();saveSettings();applyAllSettings();alert('Данные импортированы! Страница перезагрузится.');location.reload();}catch(err){alert('Ошибка! Проверьте файл.');}};reader.readAsText(file);}

        function createPostElement(post,isOwner){
            const div=document.createElement('div');
            div.className='post';
            div.style.animation=`${settings.animation} ${settings.animationSpeed} ease forwards`;
            div.id='post-'+post.id;

            const user=users[post.userId];
            const avatarUrl=post.userAvatar||(user?.avatar)||getDefaultAvatar();
            const lastComment=post.comments[post.comments.length-1];
            const totalComments=post.comments.length;

            if(currentUser!==null&&currentUser!==post.userId){post.views++;savePosts();}

            div.innerHTML=`${post.pinned?'<div style="color:var(--accent);font-size:12px;margin-bottom:8px;">📌 Закреплён</div>':''}${post.source==='repost'?`<div style="color:var(--secondary);font-size:12px;margin-bottom:8px;">🔄 Репост от <span style="cursor:pointer;text-decoration:underline;" onclick="viewUserProfile(${post.originalUserId})">@${post.originalNick}</span></div>`:''}${(isOwner||currentUser===post.userId)?`<div class="post-menu" onclick="togglePostMenu(${post.id})">⋯</div><div class="post-menu-content" id="post-menu-${post.id}"><button onclick="deletePost(${post.id})" class="danger">🗑️ Удалить пост</button><button onclick="pinPost(${post.id})">📌 ${post.pinned?'Открепить':'Закрепить'}</button>${post.userId===currentUser?`<button onclick="showPostStats(${post.id})">📊 Статистика</button>`:''}</div>`:''}<div class="post-header"><img src="${avatarUrl}" class="post-avatar" onclick="viewUserProfile(${post.userId})"><div><strong style="cursor:pointer;" onclick="viewUserProfile(${post.userId})">${post.nick}</strong><span style="color:var(--secondary);margin-left:5px;">${post.username}</span><div style="font-size:12px;color:var(--secondary);">${new Date(post.date).toLocaleString()}</div></div></div><div style="white-space:pre-wrap;">${formatPostText(post.text)}</div>${post.media&&post.media.length>0?`<div class="post-media">${post.media.map(m=>{const filter=m.filter?`filter:brightness(${m.filter.brightness||100}%) contrast(${m.filter.contrast||100}%) saturate(${m.filter.saturation||100}%);`:'';return m.type==='image'?`<img src="${m.url}" style="${filter}" loading="lazy">`:m.type==='video'?`<video src="${m.url}" controls style="${filter}" preload="metadata"></video>`:`<audio controls src="${m.url}" style="width:100%;margin:10px 0;" preload="metadata"></audio>`;}).join('')}</div>`:''}${post.hashtags&&post.hashtags.length>0?`<div style="margin:10px 0;">${post.hashtags.map(t=>`<span style="color:var(--accent);cursor:pointer;" onclick="document.getElementById('searchInput').value='${t}';setSearchCategory('posts');performSearch('${t}');window.scrollTo(0,0);">${t}</span>`).join(' ')}</div>`:''}<div class="post-actions"><span class="like-btn ${currentUser!==null&&post.likes.includes(currentUser)?'liked':''}" onclick="likePost(${post.id})">${currentUser!==null&&post.likes.includes(currentUser)?'❤️':'🤍'}</span><span>${post.likes.length}</span><span>💬 ${totalComments}</span><span>🔄 ${post.reposts.length}</span><span>👁️ ${post.views}</span><button class="secondary" onclick="repostPost(${post.id})" style="font-size:12px;padding:5px 10px;">Репост</button></div>${totalComments>0?`<div class="comment-preview"><div class="comment"><div class="comment-header"><strong>${lastComment.nick}</strong><div style="font-size:12px;color:var(--secondary);">${new Date(lastComment.date).toLocaleString()}</div></div><div>${lastComment.text}</div></div>${totalComments>1?`<div class="show-all-comments" onclick="showAllComments(${post.id})">Показать все ${totalComments} комментариев</div>`:''}</div>`:''}${currentUser!==null?`<div style="display:flex;gap:10px;margin-top:10px;"><input type="text" id="comment-${post.id}" placeholder="Написать комментарий..."><button onclick="addComment(${post.id})">Отправить</button></div>`:''}`;
            return div;
        }

        function formatPostText(text){
            if(!text)return'';
            return text.replace(/#(\w+)/g,'<span style="color:var(--accent);">#$1</span>').replace(/@(\w+)/g,'<span style="color:var(--accent);">@$1</span>');
        }

        function updateUI(){
            const loginBtn=document.getElementById('loginBtn');const logoutBtn=document.getElementById('logoutBtn');
            const profileBtn=document.getElementById('profileBtn');const messagesBtn=document.getElementById('messagesBtn');
            const groupsBtn=document.getElementById('groupsBtn');const notificationsBtn=document.getElementById('notificationsBtn');
            if(currentUser!==null){loginBtn.style.display='none';logoutBtn.style.display='inline-block';profileBtn.style.display='inline-block';messagesBtn.style.display='inline-block';groupsBtn.style.display='inline-block';notificationsBtn.style.display='inline-block';}
            else{loginBtn.style.display='inline-block';logoutBtn.style.display='none';profileBtn.style.display='none';messagesBtn.style.display='none';groupsBtn.style.display='none';notificationsBtn.style.display='none';}
            updateNotifBadge();
        }

        document.addEventListener('keydown',e=>{
            if(e.key==='Escape'){closeStoryViewer();closeGiftOverlay();}
            if(e.key==='ArrowRight'&&document.getElementById('storyViewer').classList.contains('active'))nextStory();
            if(e.key==='ArrowLeft'&&document.getElementById('storyViewer').classList.contains('active'))prevStory();
        });

        setInterval(()=>{const before=stories.length;stories=stories.filter(s=>s.expiresAt>Date.now());if(stories.length!==before)saveStories();},60000);

        applyAllSettings();updateUI();renderPage();
        console.log('🟢 What and When v2.1 запущен! Исправлены: стекло, неон, поиск, анимации.');
    </script>
</body>
</html>
